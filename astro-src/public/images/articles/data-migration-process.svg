<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diagram procesu migracji danych miedzy systemami</title>
  <desc id="desc">Schemat etapow: analiza zrodel, ekstrakcja, staging, mapowanie i transformacja, walidacja, migracje testowe, cutover oraz system docelowy i archiwum.</desc>
  <!--
    Diagram pelni role redakcyjnej grafiki objasniajacej proces migracji danych.
    Uklad jest czytany od lewej do prawej i z gory na dol:
    1) zrodla danych i audyt,
    2) ekstrakcja + staging,
    3) mapowanie / transformacja / walidacja,
    4) migracje probne i decyzja o cutover,
    5) system docelowy, archiwum i monitoring.
  -->
  <rect width="1600" height="980" rx="32" fill="#F7FAFC"/>
  <rect x="36" y="36" width="1528" height="908" rx="28" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>

  <defs>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2FA3C7"/>
      <stop offset="100%" stop-color="#5874D8"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FCFE"/>
      <stop offset="100%" stop-color="#EEF5FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="3.5" refY="2.5" orient="auto">
      <path d="M0 0L5 2.5L0 5V0Z" fill="#5B6B82"/>
    </marker>
  </defs>

  <text x="88" y="120" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">
    Migracja danych do nowego systemu
  </text>
  <text x="88" y="164" fill="#577089" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">
    Proces od audytu zrodel, przez ETL i walidacje, do cutover oraz archiwum danych historycznych
  </text>

  <rect x="88" y="220" width="310" height="180" rx="24" fill="url(#softPanel)" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="116" y="266" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">1. Zrodla i audyt danych</text>
  <text x="116" y="302" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- ERP / Excel / stare aplikacje</text>
  <text x="116" y="332" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- master data i transakcje</text>
  <text x="116" y="362" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- duplikaty, braki, relacje</text>

  <rect x="456" y="220" width="300" height="180" rx="24" fill="url(#softPanel)" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="484" y="266" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">2. Ekstrakcja i staging</text>
  <text x="484" y="302" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- eksport CSV / API / SQL</text>
  <text x="484" y="332" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- wersjonowane wsady</text>
  <text x="484" y="362" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- bufor testowy przed importem</text>

  <rect x="814" y="220" width="340" height="180" rx="24" fill="url(#softPanel)" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="842" y="266" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">3. Mapowanie i transformacja</text>
  <text x="842" y="302" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- slowniki i pola docelowe</text>
  <text x="842" y="332" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- standaryzacja formatow</text>
  <text x="842" y="362" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- reguly biznesowe i referencje</text>

  <rect x="1212" y="220" width="300" height="180" rx="24" fill="url(#softPanel)" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="1240" y="266" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">4. Walidacja jakosci</text>
  <text x="1240" y="302" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- liczniki rekordow</text>
  <text x="1240" y="332" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- zgodnosc relacji i sald</text>
  <text x="1240" y="362" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- raport bledow i poprawki</text>

  <rect x="220" y="520" width="360" height="190" rx="26" fill="#FDFEFF" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="252" y="568" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">5. Migracje testowe</text>
  <text x="252" y="606" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- probny import na srodowisko testowe</text>
  <text x="252" y="636" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- korekty mapowania i wydajnosci</text>
  <text x="252" y="666" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- akceptacja biznesowa uzytkownikow</text>

  <rect x="646" y="500" width="308" height="230" rx="28" fill="url(#accentBlue)" filter="url(#shadow)"/>
  <text x="682" y="560" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">6. Cutover</text>
  <text x="682" y="606" fill="#EAF7FB" font-family="Inter, Arial, sans-serif" font-size="17">- freeze zmian</text>
  <text x="682" y="638" fill="#EAF7FB" font-family="Inter, Arial, sans-serif" font-size="17">- finalny backup</text>
  <text x="682" y="670" fill="#EAF7FB" font-family="Inter, Arial, sans-serif" font-size="17">- koncowa synchronizacja</text>
  <text x="682" y="702" fill="#EAF7FB" font-family="Inter, Arial, sans-serif" font-size="17">- decyzja go / no-go</text>

  <rect x="1020" y="520" width="492" height="190" rx="26" fill="#FDFEFF" stroke="#D2DEE9" filter="url(#shadow)"/>
  <text x="1050" y="568" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">7. System docelowy i monitoring</text>
  <text x="1050" y="606" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- import danych aktywnych do nowego rozwiazania</text>
  <text x="1050" y="636" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- kontrola procesow po starcie i szybkie poprawki</text>
  <text x="1050" y="666" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">- archiwum danych historycznych i sciezka audytu</text>

  <rect x="1088" y="786" width="356" height="100" rx="22" fill="#F2F8FC" stroke="#D2DEE9"/>
  <text x="1120" y="830" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Formaty i artefakty po drodze</text>
  <text x="1120" y="862" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">CSV - XLSX - JSON - API - backup - raport walidacji</text>

  <path d="M398 310H446" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M756 310H804" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1154 310H1202" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M968 400V462H800V490" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M398 400V494" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 614H636" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M954 614H1010" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1266 710V776" stroke="#5B6B82" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="780" width="840" height="108" rx="22" fill="#F7FAFC" stroke="#D7E1EA"/>
  <text x="124" y="826" fill="#17324D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Kluczowa zasada projektu</text>
  <text x="124" y="860" fill="#50657D" font-family="Inter, Arial, sans-serif" font-size="16">
    Nie migruje sie wszystkiego "jak leci" - najpierw porzadkuje sie dane, uzgadnia mapowanie i przechodzi przez migracje probne.
  </text>
</svg>
